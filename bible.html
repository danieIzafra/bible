<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia Premium - Modo Foco Absoluto</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&family=Lora:ital,wght@0,400;1,400&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET E VARIÁVEIS CSS --- */
        :root {
            --glass-bg: rgba(20, 25, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #fdfdfd;
            --text-secondary: #c9d1d9;
            --accent: #d4af37;
            
            --bible-font: 'Playfair Display', serif;
            --chapter-size: 1.3rem;
            --focus-size: 3.5rem;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background-color: #050505;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* --- BACKGROUND CINEMÁTICO --- */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #31102f 100%);
            background-size: 200% 200%;
            animation: breathe 15s ease infinite alternate;
            z-index: -2;
        }

        .ambient-light {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw; height: 80vh;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        @keyframes breathe {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        /* --- CONTAINER PRINCIPAL --- */
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: all 0.6s ease;
            position: relative;
        }

        .mode-focus #app-container {
            background: transparent;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }

        /* --- CABEÇALHO E MENU --- */
        header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px 40px;
            border-bottom: 1px solid var(--glass-border);
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 50;
        }

        .mode-focus header {
            transform: translateY(-100%);
            opacity: 0;
            position: absolute;
            width: 100%;
            pointer-events: none;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .brand {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .controls-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        select, button {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 14px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        select option { background: #1e1e24; color: #fff; }

        button:hover, select:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        #btn-audio {
            color: var(--accent);
            border-color: rgba(212, 175, 55, 0.4);
            font-weight: 500;
        }
        
        #btn-audio:hover { background: rgba(212, 175, 55, 0.15); }

        #toggle-mode-btn {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(212, 175, 55, 0.05) 100%);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: var(--accent);
            font-weight: 600;
        }

        #toggle-mode-btn:hover {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.3) 0%, rgba(212, 175, 55, 0.1) 100%);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        /* Menu Retrátil (Drawer) para economizar espaço */
        .settings-panel {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: flex-end;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0 15px;
        }

        .settings-panel.active {
            max-height: 100px;
            opacity: 1;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-top: 5px;
        }

        /* Seletores Principais de Navegação (Glassmorphism) */
        .nav-selectors {
            display: flex;
            gap: 15px;
            flex: 1;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .nav-selectors select {
            flex: 1;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .nav-selectors select:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.1);
        }

        /* --- ÁREA PRINCIPAL --- */
        main {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .mode-focus main { cursor: pointer; }

        /* --- NAVEGAÇÃO LATERAL --- */
        .nav-btn {
            width: 8vw;
            min-width: 50px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .nav-btn:hover {
            color: var(--accent);
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%);
        }
        #next-btn:hover { background: linear-gradient(270deg, rgba(255,255,255,0.03) 0%, transparent 100%); }
        .mode-focus .nav-btn { display: none; }

        /* --- ÁREA DE TEXTO --- */
        .content-area {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: 40px 5%;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .mode-focus .content-area {
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8%;
        }
        
        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.5); border-radius: 10px; }

        /* MODO 1: CAPÍTULO */
        .chapter-title {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: var(--accent);
            text-align: center;
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .verses-container {
            font-family: var(--bible-font);
            font-size: var(--chapter-size);
            line-height: 1.8;
            color: var(--text-secondary);
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 60px;
        }

        /* EFEITOS DE SELEÇÃO E AUDIO NOS VERSÍCULOS */
        .verse-item { 
            margin-bottom: 15px; 
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 3px solid transparent;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
        }
        
        .verse-item:hover { 
            color: var(--text-primary); 
            background: rgba(255, 255, 255, 0.02);
        }

        .verse-item.selected {
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.12) 0%, transparent 100%);
            border-left: 3px solid var(--accent);
            color: var(--text-primary);
            transform: scale(1.02);
            box-shadow: -5px 0 20px rgba(212, 175, 55, 0.08);
        }

        .verse-item.playing {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.15) 0%, transparent 100%);
            border-left: 3px solid #fff;
            color: #fff;
            transform: scale(1.03);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .verse-number {
            font-family: 'Inter', sans-serif;
            font-size: 0.65em;
            color: var(--accent);
            font-weight: 600;
            vertical-align: super;
            margin-right: 6px;
            opacity: 0.8;
        }

        /* MODO 2: FOCO */
        .focus-container {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            text-align: center;
        }

        .focus-reference {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .focus-text {
            font-family: var(--bible-font);
            font-size: var(--focus-size);
            line-height: 1.4;
            color: var(--text-primary);
            font-style: italic;
            text-shadow: 0 8px 30px rgba(0,0,0,0.8);
        }

        .mode-chapter .focus-container { display: none; }
        .mode-chapter .verses-container { display: block; }
        .mode-focus .verses-container { display: none; }
        .mode-focus .focus-container { display: flex; }

        #exit-focus-btn {
            display: none;
            position: fixed;
            top: 25px;
            right: 25px;
            background: rgba(0,0,0,0.4);
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 10px 20px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .mode-focus #exit-focus-btn { display: block; opacity: 0.2; }
        .mode-focus #exit-focus-btn:hover { opacity: 1; background: rgba(255,255,255,0.2); color: #fff; }

        @keyframes fadeInText {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .loading {
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--accent);
            margin-top: 20vh;
        }

        /* --- ADAPTAÇÃO PARA CELULAR (MOBILE RESPONSIIVO) --- */
        @media (max-width: 768px) {
            header { padding: 15px; gap: 10px; }
            .header-row { flex-wrap: nowrap; margin-bottom: 5px; }
            
            .brand { font-size: 1.4rem; letter-spacing: 1px; }
            .btn-text { display: none; } /* Esconde o texto dos botões no mobile para não poluir */
            
            .nav-selectors { gap: 10px; }
            .nav-selectors select { padding: 10px; font-size: 1rem; }

            .settings-panel { flex-wrap: wrap; justify-content: space-between; gap: 10px; }
            .settings-panel.active { max-height: 200px; }
            .settings-panel select, .settings-panel .controls-group { width: 48%; }
            .settings-panel .controls-group { justify-content: center; }
            
            /* Botões laterais flutuantes no mobile (Glassmorphism) */
            .nav-btn {
                display: flex;
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                width: 40px;
                height: 80px;
                background: rgba(255, 255, 255, 0.08);
                backdrop-filter: blur(10px);
                -webkit-backdrop-filter: blur(10px);
                border-radius: 12px;
                border: 1px solid rgba(255, 255, 255, 0.15);
                font-size: 1.2rem;
                z-index: 40;
            }
            #prev-btn { left: -5px; border-top-left-radius: 0; border-bottom-left-radius: 0; }
            #next-btn { right: -5px; border-top-right-radius: 0; border-bottom-right-radius: 0; }

            .content-area { padding: 20px 12%; }
            
            .chapter-title { font-size: 2rem; }
            .focus-text { font-size: calc(var(--focus-size) * 0.7); }
            .focus-reference { font-size: 1.2rem; }
            
            #exit-focus-btn { top: 15px; right: 15px; opacity: 0.5; font-size: 0.8rem; padding: 8px 15px; }
        }

        /* --- TEMA CLARO --- */
        body.theme-light {
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-primary: #121212;
            --text-secondary: #3a3a4a;
            --accent: #b38800; 
            background-color: #e2e8f0;
        }

        body.theme-light .background {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 50%, #cbd5e1 100%);
        }

        body.theme-light .ambient-light {
            background: radial-gradient(circle, rgba(179, 136, 0, 0.15) 0%, rgba(255,255,255,0) 70%);
        }

        body.theme-light header { background: linear-gradient(180deg, rgba(0,0,0,0.03) 0%, transparent 100%); }

        body.theme-light select, 
        body.theme-light button {
            background: rgba(0, 0, 0, 0.04);
            color: var(--text-primary);
            border-color: rgba(0, 0, 0, 0.1);
        }

        body.theme-light .settings-panel.active { background: rgba(255, 255, 255, 0.4); }

        body.theme-light .nav-selectors select {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #121212;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body.theme-light .nav-selectors select:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(179, 136, 0, 0.4);
        }

        body.theme-light #toggle-mode-btn {
            background: linear-gradient(135deg, rgba(179, 136, 0, 0.15) 0%, rgba(179, 136, 0, 0.05) 100%);
            border: 1px solid rgba(179, 136, 0, 0.3);
        }

        body.theme-light select option { background: #f8fafc; color: #121212; }

        body.theme-light button:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.2);
        }

        body.theme-light .nav-btn { 
            color: rgba(0, 0, 0, 0.3); 
            background: rgba(0, 0, 0, 0.03); 
            border-color: rgba(0, 0, 0, 0.1);
        }
        body.theme-light .nav-btn:hover {
            color: var(--accent);
            background: linear-gradient(90deg, rgba(0,0,0,0.05) 0%, transparent 100%);
        }
        
        body.theme-light .verse-item.selected {
            background: linear-gradient(90deg, rgba(179, 136, 0, 0.1) 0%, transparent 100%);
        }
        body.theme-light .verse-item.playing {
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.08) 0%, transparent 100%);
            border-left: 3px solid #121212;
            color: #121212;
        }
    </style>
</head>
<body class="mode-chapter">

    <div class="background"></div>
    <div class="ambient-light"></div>

    <div id="app-container">
        <button id="exit-focus-btn">✖ Sair do Foco</button>

        <header id="main-header">
            <div class="header-row">
                <div class="brand">A Palavra</div>
        
                <div class="controls-group">
                    <button onclick="window.location.href='menu.html'" title="Voltar ao Menu">🏠<span class="btn-text"> Menu</span></button>
                    
                    <button id="btn-audio" title="Ouvir Capítulo">▶<span class="btn-text"> Ouvir</span></button>
                    <button id="theme-btn" title="Alternar Tema">☀️<span class="btn-text"> Tema</span></button>
                    <button id="toggle-settings-btn" title="Ajustes">⚙️</button>
                    <button id="toggle-mode-btn">❖<span class="btn-text"> Foco</span></button>
                </div>
            </div>

            <div class="header-row">
                <div class="nav-selectors">
                    <select id="book-select"><option>Carregando...</option></select>
                    <select id="chapter-select"><option>-</option></select>
                </div>
            </div>

            <div class="settings-panel" id="settings-panel">
                <select id="version-select" title="Versão da Bíblia">
                    <option value="pt_acf">ACF</option>
                    <option value="pt_nvi">NVI</option>
                </select>
                <select id="font-select" title="Tipo de Fonte">
                    <option value="'Playfair Display', serif">Playfair</option>
                    <option value="'Lora', serif">Lora</option>
                    <option value="'Roboto', sans-serif">Roboto</option>
                </select>
                <div class="controls-group">
                    <button id="btn-size-down" title="Diminuir">A-</button>
                    <button id="btn-size-up" title="Aumentar">A+</button>
                </div>
            </div>
        </header>

        <main id="main-area">
    
            <button class="nav-btn" id="prev-btn">❮</button>
            
            <div class="content-area" id="content-area">
                <div id="loading-msg" class="loading">Desdobrando os Pergaminhos...</div>
                
                <div class="verses-container" id="chapter-view">
                    <h2 class="chapter-title" id="chapter-title"></h2>
                    <div id="verses-list"></div>
                </div>

                <div class="focus-container" id="focus-view">
                    <div class="focus-reference" id="focus-ref"></div>
                    <div class="focus-text" id="focus-text"></div>
                </div>
            </div>

            <button class="nav-btn" id="next-btn">❯</button>
        </main>
    </div>

    <script>
        // --- ESTADO E CONFIGURAÇÕES ---
        let bibleData = [];
        let currentBookIndex = 0;
        let currentChapterIndex = 0;
        let currentVerseIndex = 0;
        let isFocusMode = false;
        
        let currentChapterSize = 1.3;
        let currentFocusSize = 3.5; 
        
        let isPlayingAudio = false;

        // --- ELEMENTOS DOM ---
        const body = document.body;
        const mainArea = document.getElementById('main-area');
        const contentArea = document.getElementById('content-area');
        
        const versionSel = document.getElementById('version-select');
        const fontSel = document.getElementById('font-select');
        const btnSizeUp = document.getElementById('btn-size-up');
        const btnSizeDown = document.getElementById('btn-size-down');
        const bookSel = document.getElementById('book-select');
        const chapSel = document.getElementById('chapter-select');
        
        const themeBtn = document.getElementById('theme-btn');
        const toggleModeBtn = document.getElementById('toggle-mode-btn');
        const toggleSettingsBtn = document.getElementById('toggle-settings-btn');
        const settingsPanel = document.getElementById('settings-panel');
        const exitFocusBtn = document.getElementById('exit-focus-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const btnAudio = document.getElementById('btn-audio');
        
        const loadingMsg = document.getElementById('loading-msg');
        const chapterTitle = document.getElementById('chapter-title');
        const versesList = document.getElementById('verses-list');
        const focusRef = document.getElementById('focus-ref');
        const focusText = document.getElementById('focus-text');

        // Toggle Painel de Configurações
        toggleSettingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('active');
            toggleSettingsBtn.style.background = settingsPanel.classList.contains('active') ? 'rgba(212, 175, 55, 0.2)' : '';
            toggleSettingsBtn.style.borderColor = settingsPanel.classList.contains('active') ? 'rgba(212, 175, 55, 0.4)' : '';
        });

        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        // --- SISTEMA DE SALVAMENTO (LOCAL STORAGE) ---
        function saveProgress() {
            const data = {
                version: versionSel.value,
                font: fontSel.value,
                chapterSize: currentChapterSize,
                focusSize: currentFocusSize,
                bookIndex: currentBookIndex,
                chapterIndex: currentChapterIndex,
                verseIndex: currentVerseIndex,
                isFocusMode: isFocusMode,
                isLightMode: body.classList.contains('theme-light')
            };
            localStorage.setItem('biblePremiumData', JSON.stringify(data));
        }

        function loadProgress() {
            const saved = localStorage.getItem('biblePremiumData');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    versionSel.value = data.version || 'pt_acf';
                    fontSel.value = data.font || "'Playfair Display', serif";
                    currentChapterSize = data.chapterSize || 1.3;
                    currentFocusSize = data.focusSize || 3.5;
                    currentBookIndex = data.bookIndex || 0;
                    currentChapterIndex = data.chapterIndex || 0;
                    currentVerseIndex = data.verseIndex || 0;
                    isFocusMode = data.isFocusMode || false;

                    document.documentElement.style.setProperty('--bible-font', fontSel.value);
                    document.documentElement.style.setProperty('--chapter-size', `${currentChapterSize}rem`);
                    document.documentElement.style.setProperty('--focus-size', `${currentFocusSize}rem`);

                    if (data.isLightMode) {
                        body.classList.add('theme-light');
                        themeBtn.innerHTML = '🌙<span class="btn-text"> Tema</span>';
                    }

                    if (isFocusMode) {
                        body.classList.remove('mode-chapter');
                        body.classList.add('mode-focus');
                    }
                } catch (e) {}
            }
        }

        // --- CARREGAR BÍBLIA (API) ---
        async function loadBible(version) {
            loadingMsg.style.display = 'block';
            chapterTitle.style.display = 'none';
            versesList.style.display = 'none';
            stopAudio(); 
            
            try {
                const response = await fetch(`https://raw.githubusercontent.com/thiagobodruk/bible/master/json/${version}.json`);
                bibleData = await response.json();
                
                loadingMsg.style.display = 'none';
                chapterTitle.style.display = 'block';
                versesList.style.display = 'block';
                
                populateBooks();
                renderView();
            } catch (error) {
                loadingMsg.textContent = "Falha ao baixar. Verifique sua conexão.";
            }
        }

        function populateBooks() {
            bookSel.innerHTML = '';
            bibleData.forEach((book, index) => bookSel.add(new Option(book.name, index)));
            bookSel.value = currentBookIndex;
            updateChapterMenu();
        }

        function updateChapterMenu() {
            chapSel.innerHTML = '';
            const chapters = bibleData[currentBookIndex].chapters;
            chapters.forEach((_, index) => chapSel.add(new Option(`Capítulo ${index + 1}`, index)));
            if(currentChapterIndex >= chapters.length) currentChapterIndex = 0;
            chapSel.value = currentChapterIndex;
        }

        // --- SELEÇÃO DE VERSÍCULO ---
        function toggleVerseSelection(index) {
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('selected'));
            const verseEl = document.getElementById(`verse-${index}`);
            if(verseEl) {
                verseEl.classList.add('selected');
                currentVerseIndex = index;
            }
        }

        // --- SISTEMA DE ÁUDIO ROBUSTO ---
        function stopAudio() {
            window.speechSynthesis.cancel();
            isPlayingAudio = false;
            btnAudio.innerHTML = '▶<span class="btn-text"> Ouvir</span>';
            btnAudio.style.color = 'var(--accent)';
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('playing'));
        }

        function playChapter() {
            if (isPlayingAudio) {
                stopAudio();
                return;
            }

            const versesArray = bibleData[currentBookIndex].chapters[currentChapterIndex];
            window.speechSynthesis.cancel(); 

            let voices = window.speechSynthesis.getVoices();
            let ptVoice = voices.find(v => v.lang.includes('pt-BR') && (v.name.includes('Google') || v.name.includes('Natural'))) 
                       || voices.find(v => v.lang.includes('pt-BR'))
                       || voices.find(v => v.lang.includes('pt'));

            versesArray.forEach((text, index) => {
                let utterance = new SpeechSynthesisUtterance(text);
                if (ptVoice) utterance.voice = ptVoice;
                
                utterance.rate = 0.95; 
                utterance.pitch = 1.0;

                utterance.onstart = () => {
                    document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('playing'));
                    let activeVerse = document.getElementById(`verse-${index}`);
                    if (activeVerse) {
                        activeVerse.classList.add('playing');
                        activeVerse.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                };

                utterance.onend = () => {
                    if (index === versesArray.length - 1) {
                        stopAudio();
                    }
                };

                window.speechSynthesis.speak(utterance);
            });

            isPlayingAudio = true;
            btnAudio.innerHTML = '⏸<span class="btn-text"> Parar</span>';
            btnAudio.style.color = '#fff';
        }

        btnAudio.addEventListener('click', playChapter);

        // --- RENDERIZAR TELA ---
        function renderView() {
            if(bibleData.length === 0) return;
            const bookName = bibleData[currentBookIndex].name;
            const chapterNum = currentChapterIndex + 1;
            const versesArray = bibleData[currentBookIndex].chapters[currentChapterIndex];

            bookSel.value = currentBookIndex;
            chapSel.value = currentChapterIndex;
            
            if (!isFocusMode) {
                contentArea.scrollTop = 0;
                chapterTitle.textContent = `${bookName} ${chapterNum}`;
                let htmlStr = '';
                versesArray.forEach((text, i) => {
                    const isSelected = (i === currentVerseIndex) ? 'selected' : '';
                    htmlStr += `<p class="verse-item ${isSelected}" id="verse-${i}" onclick="toggleVerseSelection(${i})"><span class="verse-number">${i + 1}</span>${text}</p>`;
                });
                versesList.innerHTML = htmlStr;
                
                setTimeout(() => {
                    const selectedEl = document.getElementById(`verse-${currentVerseIndex}`);
                    if(selectedEl && currentVerseIndex > 0) {
                        selectedEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);

            } else {
                const verseNum = currentVerseIndex + 1;
                focusRef.textContent = `${bookName} ${chapterNum}:${verseNum}`;
                focusText.textContent = `"${versesArray[currentVerseIndex]}"`;
                
                focusText.style.animation = 'none';
                void focusText.offsetWidth;
                focusText.style.animation = 'fadeInText 0.8s cubic-bezier(0.2, 0.8, 0.2, 1)';
            }
            
            saveProgress();
        }

        // --- CONTROLES DE FONTE ---
        function updateTextSize(delta) {
            currentChapterSize = Math.max(0.8, Math.min(3, currentChapterSize + (delta * 0.1)));
            currentFocusSize = Math.max(1.5, Math.min(6, currentFocusSize + (delta * 0.3)));
            document.documentElement.style.setProperty('--chapter-size', `${currentChapterSize}rem`);
            document.documentElement.style.setProperty('--focus-size', `${currentFocusSize}rem`);
            saveProgress();
        }

        btnSizeUp.addEventListener('click', () => updateTextSize(1));
        btnSizeDown.addEventListener('click', () => updateTextSize(-1));
        fontSel.addEventListener('change', (e) => {
            document.documentElement.style.setProperty('--bible-font', e.target.value);
            saveProgress();
        });
        versionSel.addEventListener('change', (e) => {
            loadBible(e.target.value);
        });

        // --- NAVEGAÇÃO LÓGICA ---
        function goNext() {
            stopAudio(); 
            if (!isFocusMode) {
                if (currentChapterIndex < bibleData[currentBookIndex].chapters.length - 1) {
                    currentChapterIndex++;
                    currentVerseIndex = 0; 
                } else if (currentBookIndex < bibleData.length - 1) {
                    currentBookIndex++;
                    currentChapterIndex = 0;
                    currentVerseIndex = 0;
                    updateChapterMenu();
                }
            } else {
                const versesInChapter = bibleData[currentBookIndex].chapters[currentChapterIndex].length;
                if (currentVerseIndex < versesInChapter - 1) {
                    currentVerseIndex++;
                } else if (currentChapterIndex < bibleData[currentBookIndex].chapters.length - 1) {
                    currentChapterIndex++;
                    currentVerseIndex = 0;
                    updateChapterMenu();
                } else if (currentBookIndex < bibleData.length - 1) {
                    currentBookIndex++;
                    currentChapterIndex = 0;
                    currentVerseIndex = 0;
                    updateChapterMenu();
                }
            }
            renderView();
        }

        function goPrev() {
            stopAudio();
            if (!isFocusMode) {
                if (currentChapterIndex > 0) {
                    currentChapterIndex--;
                    currentVerseIndex = 0;
                } else if (currentBookIndex > 0) {
                    currentBookIndex--;
                    currentChapterIndex = bibleData[currentBookIndex].chapters.length - 1;
                    currentVerseIndex = 0;
                    updateChapterMenu();
                }
            } else {
                if (currentVerseIndex > 0) {
                    currentVerseIndex--;
                } else if (currentChapterIndex > 0) {
                    currentChapterIndex--;
                    currentVerseIndex = bibleData[currentBookIndex].chapters[currentChapterIndex].length - 1;
                    updateChapterMenu();
                } else if (currentBookIndex > 0) {
                    currentBookIndex--;
                    currentChapterIndex = bibleData[currentBookIndex].chapters.length - 1;
                    currentVerseIndex = bibleData[currentBookIndex].chapters[currentChapterIndex].length - 1;
                    updateChapterMenu();
                }
            }
            renderView();
        }

        // --- EVENTOS ---
        bookSel.addEventListener('change', (e) => {
            currentBookIndex = parseInt(e.target.value);
            currentChapterIndex = 0;
            currentVerseIndex = 0;
            stopAudio();
            updateChapterMenu();
            renderView();
        });

        chapSel.addEventListener('change', (e) => {
            currentChapterIndex = parseInt(e.target.value);
            currentVerseIndex = 0;
            stopAudio();
            renderView();
        });

        nextBtn.addEventListener('click', goNext);
        prevBtn.addEventListener('click', goPrev);

        mainArea.addEventListener('click', (e) => {
            if (isFocusMode && e.target.id !== 'exit-focus-btn') {
                const screenWidth = window.innerWidth;
                if (e.clientX < screenWidth / 2) goPrev(); 
                else goNext(); 
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") goNext();
            if (e.key === "ArrowLeft") goPrev();
            if (e.key === "Escape" && isFocusMode) disableFocusMode();
        });

        themeBtn.addEventListener('click', () => {
            body.classList.toggle('theme-light');
            const isLight = body.classList.contains('theme-light');
            themeBtn.innerHTML = isLight ? '🌙<span class="btn-text"> Tema</span>' : '☀️<span class="btn-text"> Tema</span>';
            saveProgress();
        });

        // --- CONTROLE MODO FOCO ---
        function enableFocusMode() {
            stopAudio();
            isFocusMode = true;
            body.classList.remove('mode-chapter');
            body.classList.add('mode-focus');
            renderView();
        }

        function disableFocusMode() {
            isFocusMode = false;
            body.classList.remove('mode-focus');
            body.classList.add('mode-chapter');
            renderView();
        }

        toggleModeBtn.addEventListener('click', enableFocusMode);

        exitFocusBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            disableFocusMode();
        });

        // --- INICIALIZAÇÃO ---
        loadProgress();
        loadBible(versionSel.value);

    </script>
</body>
</html>
