<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia Premium - A Palavra</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="A Palavra">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;1,400&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* ==========================================
           ARQUITETURA DE VARIÁVEIS (ROSE GOLD LUXURY)
           ========================================== */
        :root {
            --bg-color: #141113;
            --glass-bg: rgba(36, 28, 33, 0.45);
            --glass-border: rgba(229, 178, 153, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.1);
            
            --text-primary: #F8F4F1;
            --text-secondary: #C8B9B2;
            
            --accent: #E5B299; /* Rose Gold */
            --accent-glow: rgba(229, 178, 153, 0.25);
            --accent-hover: #F2C9B6;
            
            --bible-font: 'Playfair Display', serif;
            --title-font: 'Cinzel', serif;
            --body-font: 'Inter', sans-serif;
            
            --chapter-size: 1.3rem;
            --focus-size: 3.5rem;
            
            --radius-sm: 12px;
            --radius-md: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: var(--body-font);
            color: var(--text-primary);
            background-color: var(--bg-color);
            overflow: hidden;
            touch-action: manipulation;
        }

        /* --- BACKGROUND CINEMÁTICO & GLOW --- */
        .background-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 80% -20%, var(--accent-glow) 0%, transparent 40%),
                        radial-gradient(circle at 20% 120%, rgba(229, 178, 153, 0.1) 0%, transparent 50%);
            z-index: -2;
            transition: all 0.6s ease;
        }

        /* --- CONTAINER PRINCIPAL --- */
        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            transition: all 0.6s ease;
            position: relative;
        }

        .mode-focus #app-container {
            background: rgba(10, 8, 9, 0.6);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
        }

        /* --- CABEÇALHO COM GLASSMORPHISM --- */
        header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px 5%;
            background: rgba(20, 17, 19, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease, gap 0.3s ease;
            z-index: 50;
        }

        .mode-focus header {
            transform: translateY(-100%);
            opacity: 0;
            position: absolute;
            width: 100%;
            pointer-events: none;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--title-font);
            font-size: 1.4rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .controls-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        /* Botões Globais */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            font-family: var(--body-font);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            outline: none;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn i { font-size: 1.2rem; }

        .btn:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--accent); }

        .btn-audio { color: var(--accent); border-color: rgba(229, 178, 153, 0.4); }
        .btn-audio:hover { background: rgba(229, 178, 153, 0.1); }
        .btn-audio.is-playing { background: var(--accent); color: var(--bg-color); }

        .btn-focus {
            background: linear-gradient(135deg, rgba(229, 178, 153, 0.15) 0%, rgba(229, 178, 153, 0.05) 100%);
            border-color: rgba(229, 178, 153, 0.5);
            color: var(--accent);
        }
        .btn-focus:hover { box-shadow: 0 0 15px var(--accent-glow); color: #fff; }

        /* Seletores Globais (Selects) */
        select {
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            padding: 10px 35px 10px 15px;
            border-radius: var(--radius-sm);
            font-family: var(--body-font);
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23E5B299%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 10px auto;
            transition: all 0.3s;
        }

        select option { background: var(--bg-color); color: var(--text-primary); }
        select:hover { border-color: var(--accent); }

        .nav-selectors { display: flex; gap: 15px; flex: 1; max-width: 800px; margin: 0 auto; }
        .nav-selectors select {
            flex: 1;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: var(--radius-md);
            background-color: rgba(255, 255, 255, 0.05);
            font-weight: 500;
        }

        /* Menu Retrátil (Drawer) */
        .settings-panel {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: flex-end;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .settings-panel.active {
            max-height: 120px;
            opacity: 1;
            padding-top: 15px;
        }

        /* --- ÁREA PRINCIPAL --- */
        main {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .mode-focus main { cursor: pointer; }

        /* --- NAVEGAÇÃO LATERAL (Apenas PC) --- */
        .nav-side-btn {
            width: 8vw;
            min-width: 60px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .nav-side-btn:hover {
            color: var(--accent);
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%);
        }
        #next-btn:hover { background: linear-gradient(270deg, rgba(255,255,255,0.03) 0%, transparent 100%); }
        .mode-focus .nav-side-btn { display: none; }

        /* --- ÁREA DE TEXTO --- */
        .content-area {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: 40px 5%;
            scroll-behavior: smooth;
        }

        .mode-focus .content-area {
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5%;
        }
        
        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-track { background: transparent; }
        .content-area::-webkit-scrollbar-thumb { background: rgba(229, 178, 153, 0.3); border-radius: 10px; }

        /* MODO 1: CAPÍTULO */
        .chapter-title {
            font-family: var(--title-font);
            font-size: 2.5rem;
            color: var(--accent);
            text-align: center;
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .verses-container {
            font-family: var(--bible-font);
            font-size: var(--chapter-size);
            line-height: 1.8;
            color: var(--text-secondary);
            max-width: 900px;
            margin: 0 auto;
            padding-bottom: 150px; 
        }

        /* EFEITOS DE SELEÇÃO E AUDIO NOS VERSÍCULOS */
        .verse-item { 
            margin-bottom: 15px; 
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            border-left: 3px solid transparent;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        .verse-item:hover { 
            color: var(--text-primary); 
            background: rgba(255, 255, 255, 0.02);
        }

        .verse-item.selected {
            background: linear-gradient(90deg, rgba(229, 178, 153, 0.1) 0%, transparent 100%);
            border-left: 3px solid var(--accent);
            color: var(--text-primary);
            transform: scale(1.02) translateX(5px);
        }
        
        /* Estilo para versículos selecionados no modo de cópia */
        .verse-item.multi-selected {
            background: linear-gradient(90deg, rgba(229, 178, 153, 0.2) 0%, transparent 100%);
            border-left: 3px solid var(--accent);
            color: var(--text-primary);
            transform: scale(1.02) translateX(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .verse-item.playing {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.12) 0%, transparent 100%);
            border-left: 3px solid #fff;
            color: #fff;
            transform: scale(1.03) translateX(8px);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .verse-number {
            font-family: var(--body-font);
            font-size: 0.6em;
            color: var(--accent);
            font-weight: 600;
            vertical-align: super;
            margin-right: 8px;
            opacity: 0.8;
        }

        /* MODO 2: FOCO */
        .focus-container {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .focus-reference {
            font-family: var(--title-font);
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 30px;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        .focus-text {
            font-family: var(--bible-font);
            font-size: var(--focus-size);
            line-height: 1.4;
            color: var(--text-primary);
            font-style: italic;
            text-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .mode-chapter .focus-container { display: none; }
        .mode-chapter .verses-container { display: block; }
        .mode-focus .verses-container { display: none; }
        .mode-focus .focus-container { display: flex; }

        .btn-exit-focus {
            display: none;
            position: fixed;
            top: 25px;
            right: 25px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 30px;
            font-family: var(--body-font);
            font-size: 0.95rem;
            cursor: pointer;
            z-index: 100;
            opacity: 0;
            transition: all 0.4s ease;
            align-items: center;
            gap: 8px;
        }

        .mode-focus .btn-exit-focus { display: flex; opacity: 0.3; }
        .mode-focus .btn-exit-focus:hover { opacity: 1; background: var(--accent); color: var(--bg-color); border-color: var(--accent); }

        /* Botões Flutuantes de Ação */
        .floating-action-btn {
            position: fixed;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20, 17, 19, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 14px 28px;
            border-radius: 30px;
            font-family: var(--body-font);
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--accent-glow);
            z-index: 1000;
            cursor: pointer;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            white-space: nowrap;
        }

        .floating-action-btn.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        .copy-btn { bottom: 30px; }
        .copy-btn:hover { background: var(--accent); color: var(--bg-color); }

        .gemini-btn {
            bottom: 85px; 
            background: rgba(20, 17, 19, 0.95);
            border-color: #A67CFF; 
            color: #A67CFF;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(166, 124, 255, 0.25);
        }
        .gemini-btn:hover { background: #A67CFF; color: #fff; }

        @keyframes fadeInText {
            from { opacity: 0; transform: translateY(10px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .loader-container { text-align: center; margin-top: 20vh; color: var(--accent); font-family: var(--title-font); letter-spacing: 2px;}
        .loader-ring {
            width: 50px; height: 50px; margin: 0 auto 20px;
            border: 2px solid rgba(229, 178, 153, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- TEMA CLARO --- */
        body.theme-light {
            --bg-color: #FDFBFA;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(229, 178, 153, 0.4);
            --text-primary: #2C2421;
            --text-secondary: #7A6A63;
            --accent: #D48C70; 
            --accent-glow: rgba(212, 140, 112, 0.15);
            --accent-hover: #B87358;
        }

        body.theme-light .background-layer { 
            background: radial-gradient(circle at 15% 50%, rgba(230, 230, 240, 1), transparent 50%),
                        linear-gradient(135deg, #fdfdfd 0%, #e2e4ea 100%); 
        }
        body.theme-light header { background: rgba(253, 251, 250, 0.85); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); }
        body.theme-light select, 
        body.theme-light .btn { background: rgba(255, 255, 255, 0.8); color: var(--text-primary); border-color: rgba(212, 140, 112, 0.3); }
        body.theme-light .btn:hover { background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        body.theme-light .btn-focus { background: linear-gradient(135deg, rgba(212, 140, 112, 0.15) 0%, rgba(212, 140, 112, 0.05) 100%); }
        body.theme-light select option { background: #fff; color: var(--text-primary); }
        body.theme-light .nav-side-btn { color: rgba(0, 0, 0, 0.2); }
        body.theme-light .nav-side-btn:hover { color: var(--accent); }
        body.theme-light .verse-item.selected { background: linear-gradient(90deg, rgba(212, 140, 112, 0.1) 0%, transparent 100%); }
        body.theme-light .verse-item.playing { background: linear-gradient(90deg, rgba(0, 0, 0, 0.05) 0%, transparent 100%); border-left: 3px solid #121212; color: #121212; text-shadow: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05);}
        body.theme-light .mode-focus #app-container { background: rgba(255, 255, 255, 0.5); }
        body.theme-light .focus-text { text-shadow: 0 10px 40px rgba(255,255,255,0.8); }
        body.theme-light .gemini-btn { background: rgba(255,255,255, 0.95); }

        /* --- RESPONSIVIDADE EXTREMA (MOBILE-FIRST FEEL) --- */
        @media (max-width: 768px) {
            header { padding: 15px 20px; gap: 12px; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
            .header-row { flex-wrap: nowrap; margin-bottom: 5px; }
            
            .brand-logo { font-size: 1.2rem; letter-spacing: 1px; transition: all 0.3s ease; }
            .brand-logo i { font-size: 1.4rem; }
            .btn span { display: none; } 
            
            .controls-group { gap: 8px; }
            .controls-group .btn { width: 42px; height: 42px; padding: 0; border-radius: 12px; font-size: 1.2rem; }
            
            .nav-selectors { gap: 10px; width: 100%; }
            .nav-selectors select { padding: 12px 15px; font-size: 0.95rem; border-radius: 16px; }

            .settings-panel { flex-wrap: wrap; justify-content: space-between; gap: 10px; }
            .settings-panel.active { max-height: 180px; }
            .settings-panel select { width: 48%; }
            .settings-panel .controls-group { width: 100%; justify-content: space-between; }
            .settings-panel .controls-group .btn { width: 48%; border-radius: 12px; } 
            
            .nav-side-btn { display: none !important; }
            .content-area { padding: 25px 5%; }
            .chapter-title { font-size: 1.8rem; margin-bottom: 30px; }
            .verses-container { padding-bottom: 150px; }
            .focus-text { font-size: calc(var(--focus-size) * 0.6); text-shadow: 0 5px 20px rgba(0,0,0,0.6); }
            .focus-reference { font-size: 1.2rem; }
            
            .btn-exit-focus { top: 15px; right: 15px; opacity: 0.6; padding: 10px 16px; border-radius: 12px; }
            .btn-exit-focus span { display: inline; font-size: 0.85rem;}

            /* Estado Header Fechado no Scroll */
            header.collapsed {
                padding: 10px 20px;
                border-radius: 0 0 16px 16px;
                background: rgba(15, 12, 14, 0.85);
                gap: 0;
            }
            body.theme-light header.collapsed { background: rgba(255, 255, 255, 0.9); }
            
            header.collapsed .controls-group,
            header.collapsed .bottom-row,
            header.collapsed .settings-panel {
                display: none !important;
            }
            header.collapsed .brand-logo { font-size: 1rem; width: 100%; justify-content: center; }
            header.collapsed .brand-logo i { font-size: 1.2rem; }
            header.collapsed .collapsed-ref { display: inline-block !important; }
        }
    </style>
</head>
<body class="mode-chapter">

    <div class="background-layer"></div>

    <div id="app-container">
        <button class="btn-exit-focus" id="exit-focus-btn">
            <i class="ph-light ph-x"></i> <span>Sair do Foco</span>
        </button>

        <header id="main-header">
            <div class="header-row top-row">
                <div class="brand-logo">
                    <i class="ph-light ph-crown"></i> <span>A Palavra</span>
                    <span id="collapsed-ref" class="collapsed-ref" style="display:none; font-size: 0.9rem; color: var(--text-secondary); margin-left: 8px; font-family: var(--body-font); font-weight: 400; text-transform: none; letter-spacing: normal;"></span>
                </div>
        
                <div class="controls-group">
                    <a href="menu.html" class="btn" title="Voltar ao Menu">
                        <i class="ph-light ph-house"></i><span>Menu</span>
                    </a>
                    <button id="btn-audio" class="btn btn-audio" title="Ouvir Capítulo">
                        <i class="ph-light ph-play"></i><span>Ouvir</span>
                    </button>
                    <button id="theme-btn" class="btn" title="Alternar Tema">
                        <i class="ph-light ph-sun"></i><span>Tema</span>
                    </button>
                    <button id="toggle-settings-btn" class="btn" title="Ajustes">
                        <i class="ph-light ph-sliders-horizontal"></i>
                    </button>
                    <button id="toggle-mode-btn" class="btn btn-focus">
                        <i class="ph-light ph-scan"></i><span>Foco</span>
                    </button>
                </div>
            </div>

            <div class="header-row bottom-row">
                <div class="nav-selectors">
                    <select id="book-select"><option>Carregando...</option></select>
                    <select id="chapter-select"><option>-</option></select>
                </div>
            </div>

            <div class="settings-panel" id="settings-panel">
                <select id="version-select" title="Versão da Bíblia">
                    <option value="pt_acf">ACF (Almeida Corrigida)</option>
                    <option value="pt_nvi">NVI (Nova Versão)</option>
                </select>
                <select id="font-select" title="Tipo de Fonte">
                    <option value="'Playfair Display', serif">Playfair (Clássica)</option>
                    <option value="'Lora', serif">Lora (Suave)</option>
                    <option value="'Inter', sans-serif">Inter (Moderna)</option>
                </select>
                <div class="controls-group" style="flex-wrap: nowrap; gap: 10px;">
                    <button id="btn-size-down" class="btn" title="Diminuir Fonte" style="flex:1;"><i class="ph-light ph-text-aa"></i>-</button>
                    <button id="btn-size-up" class="btn" title="Aumentar Fonte" style="flex:1;"><i class="ph-light ph-text-aa"></i>+</button>
                </div>
            </div>
        </header>

        <main id="main-area">
            
            <button class="nav-side-btn" id="prev-btn"><i class="ph-light ph-caret-left"></i></button>
            
            <div class="content-area" id="content-area">
                <div id="loading-msg" class="loader-container">
                    <div class="loader-ring"></div>
                    <div>Desdobrando os Pergaminhos...</div>
                </div>
                
                <div class="verses-container" id="chapter-view">
                    <h2 class="chapter-title" id="chapter-title"></h2>
                    <div id="verses-list"></div>
                </div>

                <div class="focus-container" id="focus-view">
                    <div class="focus-reference" id="focus-ref"></div>
                    <div class="focus-text" id="focus-text"></div>
                </div>
            </div>

            <button class="nav-side-btn" id="next-btn"><i class="ph-light ph-caret-right"></i></button>
        </main>
        
        <!-- Botões de Ação para Texto Selecionado -->
        <div id="floating-gemini-btn" class="floating-action-btn gemini-btn">
            <i class="ph-light ph-sparkle"></i> <span>Pesquisar no Gemini</span>
        </div>
        
        <div id="floating-copy-btn" class="floating-action-btn copy-btn">
            <i class="ph-light ph-copy"></i> <span id="copy-text-count">Copiar Versículo(s)</span>
        </div>
    </div>

    <script>
        // --- ESTADO E CONFIGURAÇÕES ---
        let bibleData = [];
        let currentBookIndex = 0;
        let currentChapterIndex = 0;
        let currentVerseIndex = 0;
        let isFocusMode = false;
        
        let currentChapterSize = 1.3;
        let currentFocusSize = 3.5; 
        
        let isPlayingAudio = false;

        // --- ELEMENTOS DOM ---
        const body = document.body;
        const mainArea = document.getElementById('main-area');
        const contentArea = document.getElementById('content-area');
        
        const versionSel = document.getElementById('version-select');
        const fontSel = document.getElementById('font-select');
        const btnSizeUp = document.getElementById('btn-size-up');
        const btnSizeDown = document.getElementById('btn-size-down');
        const bookSel = document.getElementById('book-select');
        const chapSel = document.getElementById('chapter-select');
        
        const themeBtn = document.getElementById('theme-btn');
        const toggleModeBtn = document.getElementById('toggle-mode-btn');
        const toggleSettingsBtn = document.getElementById('toggle-settings-btn');
        const settingsPanel = document.getElementById('settings-panel');
        const exitFocusBtn = document.getElementById('exit-focus-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const btnAudio = document.getElementById('btn-audio');
        
        const loadingMsg = document.getElementById('loading-msg');
        const chapterTitle = document.getElementById('chapter-title');
        const versesList = document.getElementById('verses-list');
        const focusRef = document.getElementById('focus-ref');
        const focusText = document.getElementById('focus-text');

        // Toggle Painel de Configurações
        toggleSettingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('active');
            if(settingsPanel.classList.contains('active')) {
                toggleSettingsBtn.style.background = 'var(--accent)';
                toggleSettingsBtn.style.color = 'var(--bg-color)';
            } else {
                toggleSettingsBtn.style.background = '';
                toggleSettingsBtn.style.color = '';
            }
        });

        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        // --- SISTEMA DE SALVAMENTO (LOCAL STORAGE) ---
        function saveProgress() {
            const data = {
                version: versionSel.value,
                font: fontSel.value,
                chapterSize: currentChapterSize,
                focusSize: currentFocusSize,
                bookIndex: currentBookIndex,
                chapterIndex: currentChapterIndex,
                verseIndex: currentVerseIndex,
                isFocusMode: isFocusMode,
                isLightMode: body.classList.contains('theme-light')
            };
            localStorage.setItem('biblePremiumData', JSON.stringify(data));
        }

        function updateThemeIcon() {
            const isLight = body.classList.contains('theme-light');
            themeBtn.innerHTML = isLight 
                ? '<i class="ph-light ph-moon"></i><span>Tema</span>' 
                : '<i class="ph-light ph-sun"></i><span>Tema</span>';
        }

        function loadProgress() {
            const saved = localStorage.getItem('biblePremiumData');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    versionSel.value = data.version || 'pt_acf';
                    fontSel.value = data.font || "'Playfair Display', serif";
                    currentChapterSize = data.chapterSize || 1.3;
                    currentFocusSize = data.focusSize || 3.5;
                    currentBookIndex = data.bookIndex || 0;
                    currentChapterIndex = data.chapterIndex || 0;
                    currentVerseIndex = data.verseIndex || 0;
                    isFocusMode = data.isFocusMode || false;

                    document.documentElement.style.setProperty('--bible-font', fontSel.value);
                    document.documentElement.style.setProperty('--chapter-size', `${currentChapterSize}rem`);
                    document.documentElement.style.setProperty('--focus-size', `${currentFocusSize}rem`);

                    if (data.isLightMode) {
                        body.classList.add('theme-light');
                    }
                    updateThemeIcon();

                    if (isFocusMode) {
                        body.classList.remove('mode-chapter');
                        body.classList.add('mode-focus');
                    }
                } catch (e) {}
            }
        }

        // --- CARREGAR BÍBLIA (API) ---
        async function loadBible(version) {
            loadingMsg.style.display = 'block';
            chapterTitle.style.display = 'none';
            versesList.style.display = 'none';
            stopAudio(); 
            
            try {
                const response = await fetch(`https://raw.githubusercontent.com/thiagobodruk/bible/master/json/${version}.json`);
                bibleData = await response.json();
                
                loadingMsg.style.display = 'none';
                chapterTitle.style.display = 'block';
                versesList.style.display = 'block';
                
                populateBooks();
                renderView();
            } catch (error) {
                loadingMsg.innerHTML = "Falha ao baixar os textos. Verifique sua conexão.";
            }
        }

        function populateBooks() {
            bookSel.innerHTML = '';
            bibleData.forEach((book, index) => bookSel.add(new Option(book.name, index)));
            bookSel.value = currentBookIndex;
            updateChapterMenu();
        }

        function updateChapterMenu() {
            chapSel.innerHTML = '';
            const chapters = bibleData[currentBookIndex].chapters;
            chapters.forEach((_, index) => chapSel.add(new Option(`Capítulo ${index + 1}`, index)));
            if(currentChapterIndex >= chapters.length) currentChapterIndex = 0;
            chapSel.value = currentChapterIndex;
        }

        // --- SELEÇÃO DE VERSÍCULO ---
        function toggleVerseSelection(index) {
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('selected'));
            const verseEl = document.getElementById(`verse-${index}`);
            if(verseEl) {
                verseEl.classList.add('selected');
                currentVerseIndex = index;
            }
        }

        // --- SISTEMA DE ÁUDIO ROBUSTO ---
        function stopAudio() {
            window.speechSynthesis.cancel();
            isPlayingAudio = false;
            btnAudio.innerHTML = '<i class="ph-light ph-play"></i><span>Ouvir</span>';
            btnAudio.classList.remove('is-playing');
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('playing'));
        }

        function playChapter() {
            if (isPlayingAudio) {
                stopAudio();
                return;
            }

            const versesArray = bibleData[currentBookIndex].chapters[currentChapterIndex];
            window.speechSynthesis.cancel(); 

            let voices = window.speechSynthesis.getVoices();
            let ptVoice = voices.find(v => v.lang.includes('pt-BR') && (v.name.includes('Google') || v.name.includes('Natural'))) 
                       || voices.find(v => v.lang.includes('pt-BR'))
                       || voices.find(v => v.lang.includes('pt'));

            versesArray.forEach((text, index) => {
                let utterance = new SpeechSynthesisUtterance(text);
                if (ptVoice) utterance.voice = ptVoice;
                
                utterance.rate = 0.95; 
                utterance.pitch = 1.0;

                utterance.onstart = () => {
                    document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('playing'));
                    let activeVerse = document.getElementById(`verse-${index}`);
                    if (activeVerse) {
                        activeVerse.classList.add('playing');
                        activeVerse.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                };

                utterance.onend = () => {
                    if (index === versesArray.length - 1) {
                        stopAudio();
                    }
                };

                window.speechSynthesis.speak(utterance);
            });

            isPlayingAudio = true;
            btnAudio.innerHTML = '<i class="ph-light ph-pause"></i><span>Parar</span>';
            btnAudio.classList.add('is-playing');
        }

        btnAudio.addEventListener('click', playChapter);

        // --- RENDERIZAR TELA ---
        function renderView() {
            if(bibleData.length === 0) return;
            const bookName = bibleData[currentBookIndex].name;
            const chapterNum = currentChapterIndex + 1;
            const versesArray = bibleData[currentBookIndex].chapters[currentChapterIndex];

            bookSel.value = currentBookIndex;
            chapSel.value = currentChapterIndex;
            
            if (!isFocusMode) {
                contentArea.scrollTop = 0;
                chapterTitle.textContent = `${bookName} ${chapterNum}`;
                let htmlStr = '';
                versesArray.forEach((text, i) => {
                    const isSelected = (i === currentVerseIndex) ? 'selected' : '';
                    htmlStr += `<p class="verse-item ${isSelected}" id="verse-${i}" 
                        onmousedown="startPress(event, ${i})" 
                        onmouseup="cancelPress()" 
                        onmouseleave="cancelPress()" 
                        ontouchstart="startPress(event, ${i})" 
                        ontouchend="cancelPress()" 
                        ontouchcancel="cancelPress()"
                        oncontextmenu="event.preventDefault();"
                        onclick="handleVerseInteraction(event, ${i})">
                        <span class="verse-number">${i + 1}</span>${text}</p>`;
                });
                versesList.innerHTML = htmlStr;
                
                setTimeout(() => {
                    const selectedEl = document.getElementById(`verse-${currentVerseIndex}`);
                    if(selectedEl && currentVerseIndex > 0) {
                        selectedEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);

            } else {
                const verseNum = currentVerseIndex + 1;
                focusRef.textContent = `${bookName} ${chapterNum}:${verseNum}`;
                focusText.textContent = `"${versesArray[currentVerseIndex]}"`;
                
                focusText.style.animation = 'none';
                void focusText.offsetWidth;
                focusText.style.animation = 'fadeInText 0.8s cubic-bezier(0.2, 0.8, 0.2, 1)';
            }
            
            saveProgress();
        }

        // --- CONTROLES DE FONTE ---
        function updateTextSize(delta) {
            currentChapterSize = Math.max(0.8, Math.min(3, currentChapterSize + (delta * 0.1)));
            currentFocusSize = Math.max(1.5, Math.min(6, currentFocusSize + (delta * 0.3)));
            document.documentElement.style.setProperty('--chapter-size', `${currentChapterSize}rem`);
            document.documentElement.style.setProperty('--focus-size', `${currentFocusSize}rem`);
            saveProgress();
        }

        btnSizeUp.addEventListener('click', () => updateTextSize(1));
        btnSizeDown.addEventListener('click', () => updateTextSize(-1));
        fontSel.addEventListener('change', (e) => {
            document.documentElement.style.setProperty('--bible-font', e.target.value);
            saveProgress();
        });
        versionSel.addEventListener('change', (e) => {
            loadBible(e.target.value);
        });

        // --- NAVEGAÇÃO LÓGICA ---
        function goNext() {
            stopAudio(); 
            if (!isFocusMode) {
                if (currentChapterIndex < bibleData[currentBookIndex].chapters.length - 1) {
                    currentChapterIndex++;
                    currentVerseIndex = 0; 
                } else if (currentBookIndex < bibleData.length - 1) {
                    currentBookIndex++;
                    currentChapterIndex = 0;
                    currentVerseIndex = 0;
                    updateChapterMenu();
                }
            } else {
                const versesInChapter = bibleData[currentBookIndex].chapters[currentChapterIndex].length;
                if (currentVerseIndex < versesInChapter - 1) {
                    currentVerseIndex++;
                } else if (currentChapterIndex < bibleData[currentBookIndex].chapters.length - 1) {
                    currentChapterIndex++;
                    currentVerseIndex = 0;
                    updateChapterMenu();
                } else if (currentBookIndex < bibleData.length - 1) {
                    currentBookIndex++;
                    currentChapterIndex = 0;
                    currentVerseIndex = 0;
                    updateChapterMenu();
                }
            }
            renderView();
        }

        function goPrev() {
            stopAudio();
            if (!isFocusMode) {
                if (currentChapterIndex > 0) {
                    currentChapterIndex--;
                    currentVerseIndex = 0;
                } else if (currentBookIndex > 0) {
                    currentBookIndex--;
                    currentChapterIndex = bibleData[currentBookIndex].chapters.length - 1;
                    currentVerseIndex = 0;
                    updateChapterMenu();
                }
            } else {
                if (currentVerseIndex > 0) {
                    currentVerseIndex--;
                } else if (currentChapterIndex > 0) {
                    currentChapterIndex--;
                    currentVerseIndex = bibleData[currentBookIndex].chapters[currentChapterIndex].length - 1;
                    updateChapterMenu();
                } else if (currentBookIndex > 0) {
                    currentBookIndex--;
                    currentChapterIndex = bibleData[currentBookIndex].chapters.length - 1;
                    currentVerseIndex = bibleData[currentBookIndex].chapters[currentChapterIndex].length - 1;
                    updateChapterMenu();
                }
            }
            renderView();
        }

        // --- EVENTOS ---
        bookSel.addEventListener('change', (e) => {
            currentBookIndex = parseInt(e.target.value);
            currentChapterIndex = 0;
            currentVerseIndex = 0;
            stopAudio();
            updateChapterMenu();
            renderView();
        });

        chapSel.addEventListener('change', (e) => {
            currentChapterIndex = parseInt(e.target.value);
            currentVerseIndex = 0;
            stopAudio();
            renderView();
        });

        nextBtn.addEventListener('click', goNext);
        prevBtn.addEventListener('click', goPrev);

        // --- CONTROLES DE DESLIZE (SWIPE) PARA CELULAR ---
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        mainArea.addEventListener('touchstart', function(event) {
            touchStartX = event.changedTouches[0].screenX;
            touchStartY = event.changedTouches[0].screenY;
        }, { passive: true });

        mainArea.addEventListener('touchend', function(event) {
            touchEndX = event.changedTouches[0].screenX;
            touchEndY = event.changedTouches[0].screenY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 50) {
                    goNext();
                } else if (diffX < -50) {
                    goPrev();
                }
            }
        }

        mainArea.addEventListener('click', (e) => {
            if (isFocusMode && e.target.id !== 'exit-focus-btn' && !e.target.closest('#exit-focus-btn')) {
                const screenWidth = window.innerWidth;
                if (e.clientX < screenWidth / 2) goPrev(); 
                else goNext(); 
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") goNext();
            if (e.key === "ArrowLeft") goPrev();
            if (e.key === "Escape" && isFocusMode) disableFocusMode();
        });

        themeBtn.addEventListener('click', () => {
            body.classList.toggle('theme-light');
            updateThemeIcon();
            saveProgress();
        });

        // --- CONTROLE MODO FOCO ---
        function enableFocusMode() {
            stopAudio();
            isFocusMode = true;
            body.classList.remove('mode-chapter');
            body.classList.add('mode-focus');
            renderView();
        }

        function disableFocusMode() {
            isFocusMode = false;
            body.classList.remove('mode-focus');
            body.classList.add('mode-chapter');
            renderView();
        }

        toggleModeBtn.addEventListener('click', enableFocusMode);

        exitFocusBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            disableFocusMode();
        });

        // --- CONTROLE DE SCROLL DO HEADER (MOBILE) ---
        let lastScrollTop = 0;
        contentArea.addEventListener('scroll', () => {
            if (window.innerWidth > 768) return; // Aplica apenas no celular
            
            let st = contentArea.scrollTop;
            const header = document.getElementById('main-header');
            const collapsedRef = document.getElementById('collapsed-ref');
            
            if(bibleData.length === 0) return;
            
            if (st > 80 && st > lastScrollTop) {
                // Rolando para baixo
                if (!header.classList.contains('collapsed')) {
                    header.classList.add('collapsed');
                    collapsedRef.textContent = `- ${bibleData[currentBookIndex].name} ${currentChapterIndex + 1}`;
                }
            } else if (st < lastScrollTop - 5 || st <= 80) {
                // Rolando para cima (ou no topo)
                header.classList.remove('collapsed');
            }
            lastScrollTop = st <= 0 ? 0 : st;
        }, { passive: true });

        // --- LÓGICA DE CÓPIA E SELEÇÃO MÚLTIPLA E GEMINI ---
        let isMultiSelectMode = false;
        let selectedVersesSet = new Set();
        let pressTimer;
        let justLongPressed = false; // Trava para impedir duplo clique ao segurar
        
        const copyBtn = document.getElementById('floating-copy-btn');
        const geminiBtn = document.getElementById('floating-gemini-btn');
        const copyTextCount = document.getElementById('copy-text-count');

        function handleVerseInteraction(event, index) {
            if (justLongPressed) {
                justLongPressed = false;
                return; // Ignora o clique fantasma logo após soltar o dedo
            }
            if (isMultiSelectMode) {
                toggleMultiSelection(index);
            } else {
                toggleVerseSelection(index); 
            }
        }

        function startPress(e, index) {
            if (isMultiSelectMode) return;
            
            pressTimer = window.setTimeout(() => {
                isMultiSelectMode = true;
                justLongPressed = true;
                selectedVersesSet.clear();
                toggleMultiSelection(index);
                
                if (navigator.vibrate) navigator.vibrate(50);
            }, 500); 
        }

        function cancelPress() {
            clearTimeout(pressTimer);
        }

        function toggleMultiSelection(index) {
            const verseEl = document.getElementById(`verse-${index}`);
            if (selectedVersesSet.has(index)) {
                selectedVersesSet.delete(index);
                verseEl.classList.remove('multi-selected');
            } else {
                selectedVersesSet.add(index);
                verseEl.classList.add('multi-selected');
            }
            updateActionButtons();
        }

        function updateActionButtons() {
            if (selectedVersesSet.size > 0) {
                copyBtn.classList.add('show');
                geminiBtn.classList.add('show');
                copyTextCount.innerText = `Copiar ${selectedVersesSet.size} Versículo(s)`;
            } else {
                exitMultiSelectMode();
            }
        }

        function exitMultiSelectMode() {
            isMultiSelectMode = false;
            selectedVersesSet.clear();
            copyBtn.classList.remove('show');
            geminiBtn.classList.remove('show');
            document.querySelectorAll('.verse-item').forEach(el => el.classList.remove('multi-selected'));
        }
        
        // Função utilitária para gerar o texto formatado final (Ex: Mateus 20:10-24)
        function getFormattedSelectedText() {
            const bookName = bibleData[currentBookIndex].name;
            const chapterNum = currentChapterIndex + 1;
            const versesArray = bibleData[currentBookIndex].chapters[currentChapterIndex];
            
            const sortedIndexes = Array.from(selectedVersesSet).sort((a, b) => a - b);
            
            let textToCopy = "";
            let verseReferences = [];
            
            sortedIndexes.forEach(idx => {
                textToCopy += `${versesArray[idx]} `;
                verseReferences.push(idx + 1); // Versículos começam em 1
            });
            
            let refString = "";
            if (verseReferences.length === 1) {
                refString = `${bookName} ${chapterNum}:${verseReferences[0]}`;
            } else {
                let firstVerse = verseReferences[0];
                let lastVerse = verseReferences[verseReferences.length - 1];
                refString = `${bookName} ${chapterNum}:${firstVerse}-${lastVerse}`;
            }
            
            return `"${textToCopy.trim()}" ${refString}`;
        }

        // Evento: Botão de Copiar Normal
        copyBtn.addEventListener('click', () => {
            if (selectedVersesSet.size === 0) return;
            
            const finalClipboardText = getFormattedSelectedText();
            
            navigator.clipboard.writeText(finalClipboardText).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="ph-light ph-check"></i> <span>Copiado!</span>';
                copyBtn.style.background = 'var(--accent)';
                copyBtn.style.color = 'var(--bg-color)';
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.style.background = '';
                    copyBtn.style.color = '';
                    exitMultiSelectMode();
                }, 1500);
            });
        });
        
        // Evento: Botão de Pesquisar no Gemini
        geminiBtn.addEventListener('click', () => {
            if (selectedVersesSet.size === 0) return;
            
            const finalClipboardText = getFormattedSelectedText();
            
            navigator.clipboard.writeText(finalClipboardText).then(() => {
                const originalText = geminiBtn.innerHTML;
                geminiBtn.innerHTML = '<i class="ph-light ph-check"></i> <span>Copiado! Cole no app...</span>';
                
                setTimeout(() => {
                    geminiBtn.innerHTML = originalText;
                    exitMultiSelectMode();
                    window.open('https://gemini.google.com/', '_blank');
                }, 1000);
            });
        });

        // Fechar a seleção se clicar em qualquer área vazia do aplicativo
        document.addEventListener('click', (e) => {
            if (isMultiSelectMode) {
                if (!e.target.closest('.verse-item') && !e.target.closest('.floating-action-btn')) {
                    exitMultiSelectMode();
                }
            }
        });

        // --- INICIALIZAÇÃO ---
        loadProgress();
        loadBible(versionSel.value);

    </script>
</body>
</html>
